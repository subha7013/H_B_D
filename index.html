<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Boss 🎉</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="fairy-lights-container" id="fairy-lights-container">
    <svg class="wire-svg" preserveAspectRatio="none" viewBox="0 0 1000 150">
      <path id="wire-path" d="M0,20 Q100,60 200,20 T400,20 T600,20 T800,20 T1000,20" />
    </svg>
  </div>
  <!-- LOADER -->
  <div id="loader">
    <h1 id="ageText">21</h1>
  </div>

  <section id="celebration-page" class="page">

    <div class="glass-container" style="background: transparent; border: none; box-shadow: none;">
      <h2 id="celeb-hint" style="font-size: 1.5rem; margin-bottom: 30px; letter-spacing: 2px;">The Stage is Set...
      </h2>
      <button id="celeb-master-btn" class="btn-neon" onclick="celebFlow()">💡 Turn On Lights</button>
    </div>
  </section>
  <!-- CELEBRATION -->
  <section id="celebration" class="hidden">
    <h2>Level Up Time 🎂🔥</h2>
    <img id="cake" src="assets/cake-21.png">
    <img id="knife" src="assets/knnife.png">
    <button id="lightBtn">Light up the Candles ✨</button>
  </section>

  <!-- CAT SECTION -->
  <section id="catSection" class="hidden">
    <h2 id="heading">Choose Your Vibe 😎</h2>

    <div id="wishButtons">
      <button onclick="catWish(1)">Cute 🐾</button>
      <button onclick="catWish(2)">Special 💫</button>
      <button onclick="bestFriendQuestion()">Click to get Surprise 💯😎</button>
    </div>

    <div id="catDisplay"></div>
  </section>

  <!-- MEMORY -->
  <section id="memorySection" class="hidden">
    <h2 id="mem">Memories 📸</h2>

    <div class="slideshow-box">
      <img id="slideImage">
    </div>

    <div id="finalMessage" class="hidden">
      <h1>🎉 Happy Birthday Boss 💖</h1>
      <p>You make 22 look legendary ✨</p>
      <p>Stay crazy, stay amazing , Be Healthy 💪— this year is yours 🔥</p>
      <button class="btn-neon" onclick="location.reload()">Replay The Magic</button>
    </div>


    <audio id="revealMusic" src="assets/song2.mp3"></audio>
    <audio id="bgMusic" src="assets/song.m4a"></audio>
  </section>

  <script src="scripts.js"></script>
</body>

</html>
